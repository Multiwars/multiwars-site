<!DOCTYPE html>
<html lang="ru">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Скриншоты Multiwars</title>

    <link rel="stylesheet" href="style.css">

    <style>

        body{

            background:#0b0b0b;

            margin:0;
        }

        .gallery-header{

            padding:40px;

            text-align:center;

            font-size:50px;

            font-weight:bold;

            color:white;
        }

        .gallery{

            display:grid;

            grid-template-columns:
            repeat(auto-fit, minmax(350px, 1fr));

            gap:25px;

            padding:40px;
        }

        .gallery img{

            width:100%;

            height:250px;

            object-fit:cover;

            border-radius:20px;

            cursor:pointer;

            transition:0.3s;
        }

        .gallery img:hover{

            transform:scale(1.03);

            box-shadow:0 0 30px rgba(255,255,255,0.15);
        }

        /* FULLSCREEN */

        .fullscreen{

            display:none;

            position:fixed;

            z-index:9999;

            left:0;
            top:0;

            width:100%;
            height:100%;

            background:rgba(0,0,0,0.95);

            justify-content:center;
            align-items:center;
        }

        .fullscreen img{

            max-width:90%;
            max-height:90%;

            border-radius:20px;
        }

        .close-fullscreen{

            position:absolute;

            top:30px;
            right:40px;

            font-size:50px;

            color:white;

            cursor:pointer;
        }

        .back-btn{

            display:inline-block;

            margin:20px 40px;

            padding:15px 30px;

            background:#d62828;

            color:white;

            text-decoration:none;

            border-radius:12px;

            font-weight:bold;

            transition:0.3s;
        }

        .back-btn:hover{

            background:#ff3b3b;
        }

    </style>

</head>

<body>

    <a class="back-btn"
       href="/">

        ← НА ГЛАВНУЮ

    </a>

    <div class="gallery-header">

        СКРИНШОТЫ MULTIWARS

    </div>

    <div class="gallery">

        <!-- СКРИН 1 -->

        <img src="images/screen1.jpg"
             onclick="openImage(this.src)">

        <!-- СКРИН 2 -->

        <img src="images/screen2.jpg"
             onclick="openImage(this.src)">

        <!-- СКРИН 3 -->

        <img src="images/screen3.jpg"
             onclick="openImage(this.src)">

    </div>

    <!-- FULLSCREEN -->

    <div class="fullscreen"
         id="fullscreen">

        <span class="close-fullscreen"
              onclick="closeImage()">

            ×

        </span>

        <img id="fullscreen-img">

    </div>

    <script>

        function openImage(src){

            document.getElementById("fullscreen")
            .style.display = "flex";

            document.getElementById("fullscreen-img")
            .src = src;
        }

        function closeImage(){

            document.getElementById("fullscreen")
            .style.display = "none";
        }

    </script>

</body>

</html>
